# A/B Testing: header-routed cohort split.
# Variant A (v2) is the default. Requests with header X-Variant: B route to v3.
# Useful for opt-in beta cohorts, internal QA, or feature-flag-driven rollouts.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-variant-a
  namespace: aceest
  labels: { app: aceest-fitness, variant: a }
spec:
  replicas: 2
  selector: { matchLabels: { app: aceest-fitness, variant: a } }
  template:
    metadata:
      labels: { app: aceest-fitness, variant: a, version: v2 }
    spec:
      containers:
        - name: app
          image: atul411/aceest-fitness:v2.0.0
          ports: [{ containerPort: 5000, name: http }]
          envFrom:
            - configMapRef: { name: aceest-config }
            - secretRef:    { name: aceest-secrets }
          env:
            - { name: FEATURE_LEVEL, value: "2" }
            - { name: APP_VERSION,  value: "variant-a-v2" }
          readinessProbe: { httpGet: { path: /ready, port: http }, initialDelaySeconds: 5, periodSeconds: 5 }
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-variant-a
  namespace: aceest
spec:
  selector: { app: aceest-fitness, variant: a }
  ports: [{ port: 80, targetPort: 5000 }]
