apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-variant-b
  namespace: aceest
  labels: { app: aceest-fitness, variant: b }
spec:
  replicas: 2
  selector: { matchLabels: { app: aceest-fitness, variant: b } }
  template:
    metadata:
      labels: { app: aceest-fitness, variant: b, version: v3 }
    spec:
      containers:
        - name: app
          image: atul411/aceest-fitness:v3.0.0
          ports: [{ containerPort: 5000, name: http }]
          envFrom:
            - configMapRef: { name: aceest-config }
            - secretRef:    { name: aceest-secrets }
          env:
            - { name: FEATURE_LEVEL, value: "3" }
            - { name: APP_VERSION,  value: "variant-b-v3" }
          readinessProbe: { httpGet: { path: /ready, port: http }, initialDelaySeconds: 5, periodSeconds: 5 }
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-variant-b
  namespace: aceest
spec:
  selector: { app: aceest-fitness, variant: b }
  ports: [{ port: 80, targetPort: 5000 }]
