# Canary using nginx-ingress canary-weight annotation (deterministic 25/75 split).
# Stable Deployment serves 75% of traffic; canary Deployment serves 25%.
# Increase canary-weight gradually (5 -> 25 -> 50 -> 100) to promote.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-stable
  namespace: aceest
  labels: { app: aceest-fitness, track: stable }
spec:
  replicas: 3
  selector:
    matchLabels: { app: aceest-fitness, track: stable }
  template:
    metadata:
      labels: { app: aceest-fitness, track: stable, version: v2 }
    spec:
      containers:
        - name: app
          image: atul411/aceest-fitness:v2.0.0
          ports: [{ containerPort: 5000, name: http }]
          envFrom:
            - configMapRef: { name: aceest-config }
            - secretRef:    { name: aceest-secrets }
          env:
            - { name: FEATURE_LEVEL, value: "2" }
            - { name: APP_VERSION,  value: "2.0.0" }
          readinessProbe: { httpGet: { path: /ready, port: http }, initialDelaySeconds: 5, periodSeconds: 5 }
          livenessProbe:  { httpGet: { path: /health, port: http }, initialDelaySeconds: 15, periodSeconds: 20 }
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-stable
  namespace: aceest
spec:
  selector: { app: aceest-fitness, track: stable }
  ports: [{ port: 80, targetPort: 5000 }]
