# Shadow deployment via Istio VirtualService.
# Production traffic ALWAYS hits the v2 (stable) deployment.
# 100% of requests are MIRRORED (fire-and-forget; response discarded) to v3 (shadow).
# This lets you validate v3's behaviour with real traffic without user impact.
#
# Prereq: Istio installed; namespace 'aceest' labeled with `istio-injection=enabled`.
# kubectl label namespace aceest istio-injection=enabled

apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-prod
  namespace: aceest
  labels: { app: aceest-fitness, role: prod }
spec:
  replicas: 3
  selector: { matchLabels: { app: aceest-fitness, role: prod } }
  template:
    metadata:
      labels: { app: aceest-fitness, role: prod, version: v2 }
    spec:
      containers:
        - name: app
          image: atul411/aceest-fitness:v2.0.0
          ports: [{ containerPort: 5000, name: http }]
          envFrom:
            - configMapRef: { name: aceest-config }
            - secretRef:    { name: aceest-secrets }
          env:
            - { name: FEATURE_LEVEL, value: "2" }
            - { name: APP_VERSION,  value: "2.0.0-prod" }
          readinessProbe: { httpGet: { path: /ready, port: http }, initialDelaySeconds: 5, periodSeconds: 5 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-shadow
  namespace: aceest
  labels: { app: aceest-fitness, role: shadow }
spec:
  replicas: 3
  selector: { matchLabels: { app: aceest-fitness, role: shadow } }
  template:
    metadata:
      labels: { app: aceest-fitness, role: shadow, version: v3 }
    spec:
      containers:
        - name: app
          image: atul411/aceest-fitness:v3.0.0
          ports: [{ containerPort: 5000, name: http }]
          envFrom:
            - configMapRef: { name: aceest-config }
            - secretRef:    { name: aceest-secrets }
          env:
            - { name: FEATURE_LEVEL, value: "3" }
            - { name: APP_VERSION,  value: "3.0.0-shadow" }
          readinessProbe: { httpGet: { path: /ready, port: http }, initialDelaySeconds: 5, periodSeconds: 5 }
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-prod
  namespace: aceest
spec:
  selector: { app: aceest-fitness, role: prod }
  ports: [{ port: 80, targetPort: 5000 }]
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-shadow
  namespace: aceest
spec:
  selector: { app: aceest-fitness, role: shadow }
  ports: [{ port: 80, targetPort: 5000 }]
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: aceest-fitness
  namespace: aceest
spec:
  hosts: ["aceest.local"]
  gateways: ["aceest-gateway"]
  http:
    - route:
        - destination:
            host: aceest-fitness-prod
            port: { number: 80 }
          weight: 100
      mirror:
        host: aceest-fitness-shadow
        port: { number: 80 }
      mirrorPercentage:
        value: 100.0          # mirror 100% of requests; reduce for partial shadowing
---
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: aceest-gateway
  namespace: aceest
spec:
  selector: { istio: ingressgateway }
  servers:
    - port: { number: 80, name: http, protocol: HTTP }
      hosts: ["aceest.local"]
