apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-green
  namespace: aceest
  labels:
    app: aceest-fitness
    color: green
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aceest-fitness
      color: green
  template:
    metadata:
      labels:
        app: aceest-fitness
        color: green
        version: v3
    spec:
      containers:
        - name: app
          image: atulyadav123/aceest-fitness:v3.0.0
          ports: [{ containerPort: 5000, name: http }]
          env:
            - name: FEATURE_LEVEL
              value: "3"
            - name: APP_VERSION
              value: "3.0.0"
          envFrom:
            - configMapRef: { name: aceest-config }
            - secretRef:    { name: aceest-secrets }
          readinessProbe: { httpGet: { path: /ready, port: http }, initialDelaySeconds: 5, periodSeconds: 5 }
          livenessProbe:  { httpGet: { path: /health, port: http }, initialDelaySeconds: 15, periodSeconds: 20 }
