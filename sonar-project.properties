sonar.projectKey=aceest-fitness
sonar.projectName=ACEest Fitness
sonar.projectVersion=3.0.0

sonar.sources=app
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# Python
sonar.python.version=3.12
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=test-results.xml

# Exclusions
sonar.exclusions=app/templates/**,legacy-tkinter/**,**/__pycache__/**,.venv/**
sonar.coverage.exclusions=app/__init__.py,tests/**,gunicorn.conf.py

# Quality gate (suggested - configure on SonarQube server side)
# Block on: New code coverage < 80%, New duplications > 3%, Critical/Blocker issues > 0
