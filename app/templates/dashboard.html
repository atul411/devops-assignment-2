{% extends "base.html" %}
{% block title %}Dashboard · ACEest Fitness{% endblock %}
{% block content %}
<h2>Dashboard</h2>
<div class="card">
  <h3>Active Clients</h3>
  <table>
    <thead><tr><th>Name</th><th>Program</th><th>Calories</th></tr></thead>
    <tbody>
      {% for c in clients %}
        <tr>
          <td>{{ c.name }}</td>
          <td>{{ c.program or '—' }}</td>
          <td>{{ c.calories or '—' }}</td>
        </tr>
      {% else %}<tr><td colspan="3">No clients.</td></tr>{% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
